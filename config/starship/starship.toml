"$schema" = 'https://starship.rs/config-schema.json'

# Based on Starship's official "Gruvbox Rainbow" preset
# (https://starship.rs/presets/gruvbox-rainbow), trimmed to the tools in use
# (go, bun, python/uv, git, kubectl) with a more readable git status.
#
# NOTE: this preset uses Nerd Font glyphs (powerline arrows + tool icons).
# Your terminal must be set to a Nerd Font or the icons render as boxes.

format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$golang\
$bun\
$python\
$kubernetes\
[](fg:color_blue bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
Macos = "َ°€µ"
Linux = "َ°Œ½"
Debian = "َ°£ڑ"
Arch = "َ°£‡"
Alpine = ""

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

# Readable git status: counts per state instead of bare symbols.
#   +N staged   !N modified   ?N untracked   âœکN deleted   آ»N renamed
#   â‡،N ahead    â‡£N behind      $ stashed      = conflicts
[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'
conflicted = "=${count} "
ahead = "â‡،${count} "
behind = "â‡£${count} "
diverged = "â‡،${ahead_count}â‡£${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "آ»${count} "
deleted = "âœک${count} "

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# Python: also surfaces the active uv/.venv virtualenv name.
[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version)( \($virtualenv\)) ](fg:color_fg0 bg:color_blue)]($style)'

# kubectl: current Kubernetes context (and namespace when set).
[kubernetes]
disabled = false
symbol = "َ±ƒ¾"
style = "bg:color_blue"
format = '[[ $symbol $context( \($namespace\)) ](fg:color_fg0 bg:color_blue)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
